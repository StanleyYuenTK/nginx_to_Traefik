http:
    routers:
        oursky-pre-test-router: # custom name
            rule: "PathPrefix(`/`) && !PathPrefix(`/auth`)"  # !/auth for internal;
            entryPoints: # listen 80: web, 443:websecure;
                - web
            middlewares: 
                - "auth-mw"      # custom name match with middlewares
            service: "auth-svc"  # custom name match with services
    
    middlewares:
        auth-mw: # auth_request /auth;
            forwardAuth: # replace nginx proxy pass...
                address: "http://auth:5000/auth" # proxy_pass http://auth:5000/auth;

    services:
        auth-svc:
            loadBalancer:
                servers:
                    - url: "http://auth:5000/"